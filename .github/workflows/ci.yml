name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify archived status
        run: |
          test -f ARCHIVED.md
          echo "Repository archived on $(grep 'Archived on' ARCHIVED.md | cut -d' ' -f3)"
