version: "3"

tasks:
  build:
    desc: Build the package.
    cmds:
      - bun run build

  test:
    desc: Run the test suite.
    cmds:
      - bun run test

  lint:
    desc: Run the linter.
    cmds:
      - bun run lint

  clean:
    desc: Remove generated artifacts.
    cmds:
      - rm -rf dist coverage docs/.vitepress/dist docs/.vitepress/cache
