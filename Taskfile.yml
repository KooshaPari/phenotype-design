version: "3"

tasks:
  build:
    desc: Build the TypeScript package with Bun.
    cmds:
      - bun run build

  test:
    desc: Run the Vitest test suite with Bun.
    cmds:
      - bun run test

  lint:
    desc: Run Oxlint with Bun.
    cmds:
      - bun run lint

  clean:
    desc: Remove generated TypeScript and docs artifacts.
    cmds:
      - |
        node --input-type=module <<'EOF'
        import { rm } from "node:fs/promises";

        await Promise.all([
          "dist",
          "coverage",
          "docs/.vitepress/dist",
          "docs/.vitepress/cache",
        ].map((path) => rm(path, { force: true, recursive: true })));
        EOF
